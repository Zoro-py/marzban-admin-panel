services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/vpn.db
    volumes:
      - backend_data:/app/data
    ports:
      - "8010:8000"
    restart: unless-stopped

  bot:
    build: ./bot
    env_file: ./bot/.env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${PUBLIC_BACKEND_URL}
    ports:
      - "8011:80"
    restart: unless-stopped

volumes:
  backend_data:
